data_inputs: "CDC weekly flu hospital admissions (NHSN), EHR surveillance data (weekly flu test volumes, positive tests, inpatient hospitalizations from MUSC and Prisma Health)"

methods: "Recursive Quantile Regression with Phase-Aligned Analog Correction"
methods_long: "A hybrid recursive forecasting model that applies a single-step quantile regression (H0) iteratively across multiple forecast horizons (H0, H1, H2, H3). After forecasting each horizon, the predicted value is appended to the feature dataframe and all lag/slope/rolling statistics features are recomputed before forecasting the next horizon. This recursive architecture eliminates horizon shift architecturally. The model integrates phase-specific analog correction, where historical periods with similar epidemiological states provide trajectory-informed adjustments. All evaluation uses origin-specific thresholds (slope/acceleration/volatility percentiles) computed from data ≤ origin_week only, ensuring zero temporal leakage. Predictors include 38+ engineered features (lag/slope/acceleration/rolling statistics/EHR indicators/seasonal components). Phase detection (9 classes) drives adaptive blending weights and interval scaling. Real-time surveillance data from Prisma Health and MUSC supplements CDC NHSN observations."

